<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walt Whitman — Multitudes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0a08;
    --ink-2:#171310;
    --gold:#c9a227;
    --gold-bright:#e8c96a;
    --gold-deep:#7a5f16;
    --cream:#efe6c9;
    --line: rgba(201,162,39,0.35);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at 50% 0%, #201a10 0%, var(--ink) 55%),
      var(--ink);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    min-height:100vh;
    overflow-x:hidden;
  }

  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:56px 20px 80px;
    position:relative;
  }

  .page::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
    opacity:0.15;
    mix-blend-mode:overlay;
  }

  .eyebrow{
    letter-spacing:0.42em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold);
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    margin-bottom:10px;
    opacity:0.85;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(30px, 6vw, 52px);
    margin:0 0 6px 0;
    text-align:center;
    color:var(--gold-bright);
    text-shadow: 0 0 22px rgba(201,162,39,0.25);
    letter-spacing:0.01em;
  }

  .sub{
    font-style:italic;
    color:var(--cream);
    opacity:0.65;
    font-size:17px;
    margin-bottom:40px;
    text-align:center;
  }

  /* ---- Portrait frame ---- */
  .frame-wrap{
    position:relative;
    width:min(78vw, 340px);
    aspect-ratio:1/1;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
  }

  .frame{
    position:absolute;
    inset:0;
    border:3px solid var(--gold);
    box-shadow:
      inset 0 0 0 6px var(--ink),
      inset 0 0 0 9px var(--gold-deep),
      0 0 0 1px rgba(201,162,39,0.4),
      0 18px 50px rgba(0,0,0,0.65);
    background:var(--ink-2);
    overflow:hidden;
    transition: box-shadow 0.15s ease;
  }

  .frame-wrap:active .frame{
    box-shadow:
      inset 0 0 0 6px var(--ink),
      inset 0 0 0 9px var(--gold-bright),
      0 0 0 1px rgba(232,201,106,0.7),
      0 10px 30px rgba(0,0,0,0.6);
  }

  .corner{
    position:absolute;
    width:26px; height:26px;
    z-index:3;
    pointer-events:none;
  }
  .corner svg{ width:100%; height:100%; display:block; }
  .corner.tl{ top:-2px; left:-2px; }
  .corner.tr{ top:-2px; right:-2px; transform:scaleX(-1); }
  .corner.bl{ bottom:-2px; left:-2px; transform:scaleY(-1); }
  .corner.br{ bottom:-2px; right:-2px; transform:scale(-1,-1); }

  .img-stage{
    position:absolute;
    inset:9px;
    overflow:hidden;
  }

  .portrait{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    object-fit:cover;
    filter: sepia(0.35) contrast(1.08) brightness(0.92);
    opacity:0;
    transform: scale(1.02);
    transition: opacity 0.5s ease, transform 0.6s ease;
  }
  .portrait.active{
    opacity:1;
    transform: scale(1);
  }

  .frame-wrap.pulse .frame{
    animation: goldFlash 0.4s ease;
  }
  @keyframes goldFlash{
    0%{ box-shadow: inset 0 0 0 6px var(--ink), inset 0 0 0 9px var(--gold-deep), 0 0 0 1px rgba(201,162,39,0.4), 0 18px 50px rgba(0,0,0,0.65); }
    40%{ box-shadow: inset 0 0 0 6px var(--ink), inset 0 0 0 9px var(--gold-bright), 0 0 22px 6px rgba(232,201,106,0.55), 0 18px 50px rgba(0,0,0,0.65); }
    100%{ box-shadow: inset 0 0 0 6px var(--ink), inset 0 0 0 9px var(--gold-deep), 0 0 0 1px rgba(201,162,39,0.4), 0 18px 50px rgba(0,0,0,0.65); }
  }

  .tap-hint{
    margin-top:14px;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.55;
    font-family:'Cormorant Garamond', serif;
  }

  /* ---- Quote plaque ---- */
  .plaque{
    margin-top:38px;
    max-width:560px;
    width:100%;
    position:relative;
    background: linear-gradient(180deg, #16120c, #0e0b07);
    border:1px solid var(--line);
    border-radius:2px;
    padding:34px 30px 28px;
    text-align:center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(201,162,39,0.08);
  }
  .plaque::before, .plaque::after{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:60px; height:1px;
    background: var(--gold);
    opacity:0.6;
  }
  .plaque::before{ top:14px; }
  .plaque::after{ bottom:14px; }

  .quote-mark{
    font-family:'Playfair Display', serif;
    font-size:44px;
    color:var(--gold);
    line-height:1;
    opacity:0.7;
    display:block;
    margin-bottom:4px;
  }

  #quoteText{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(19px, 2.6vw, 24px);
    line-height:1.5;
    color:var(--cream);
    transition: opacity 0.35s ease, transform 0.4s ease;
    min-height:3em;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #quoteText.fade{
    opacity:0;
    transform: translateY(6px);
  }

  .quote-index{
    margin-top:16px;
    font-size:11px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.5;
  }

  /* ---- CTA button ---- */
  .cta{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:46px;
    padding:15px 34px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-deep));
    color:#1a1408;
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    border-radius:2px;
    box-shadow: 0 10px 24px rgba(201,162,39,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
    border:1px solid #4a3a0d;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta:hover{
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(201,162,39,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .cta:active{
    transform: translateY(0);
  }
  .cta svg{ width:16px; height:16px; }

  footer{
    margin-top:28px;
    font-size:12px;
    letter-spacing:0.1em;
    color:var(--gold);
    opacity:0.4;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .portrait, .frame, #quoteText{ transition:none !important; animation:none !important; }
  }
</style>
</head>

  </div>

  <a class="cta" href="https://easypagex.github.io" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    Visit EasyPageX
  </a>

  <footer>a leaf built by easypagex</footer>
</div>

<script>
  const quotes = [
    "Do I contradict myself? Very well then I contradict myself, (I am large, I contain multitudes.)",
    "I celebrate myself, and sing myself.",
    "If you want me again look for me under your boot-soles.",
    "The powerful play goes on, and you may contribute a verse.",
    "Keep your face always toward the sunshine\u2014and shadows will fall behind you.",
    "Be curious, not judgmental.",
    "Nothing can happen more beautiful than death.",
    "To me every hour of the light and dark is a miracle.",
    "We were together. I forget the rest.",
    "Afoot and light-hearted I take to the open road, healthy, free, the world before me.",
    "The secret of making the best persons... is to grow in the open air and to eat and sleep with the earth.",
    "I exist as I am, that is enough."
  ];

  const toRoman = (num) => {
    const romans = [["XII","12"],["XI","11"],["X","10"],["IX","9"],["VIII","8"],["VII","7"],["VI","6"],["V","5"],["IV","4"],["III","3"],["II","2"],["I","1"]];
    const map = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
    return map[num];
  };

  let quoteIdx = 0;
  let showingFirst = true;
  let audioCtx = null;

  const img1 = document.getElementById('img1');
  const img2 = document.getElementById('img2');
  const quoteText = document.getElementById('quoteText');
  const quoteIndex = document.getElementById('quoteIndex');
  const frameWrap = document.getElementById('frameWrap');

  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playDrum(){
    try{
      const ctx = ensureAudio();
      const now = ctx.currentTime;

      // Low thump body
      const osc = ctx.createOscillator();
      const oscGain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(48, now + 0.18);
      oscGain.gain.setValueAtTime(0.9, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
      osc.connect(oscGain);
      oscGain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.35);

      // Noisy snap layer
      const bufferSize = ctx.sampleRate * 0.2;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2.5);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 900;
      noiseFilter.Q.value = 0.7;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.55, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.2);
    }catch(e){
      // audio not available; fail silently
    }
  }

  function nextStep(){
    playDrum();

    // toggle portrait
    if(showingFirst){
      img1.classList.remove('active');
      img2.classList.add('active');
    }else{
      img2.classList.remove('active');
      img1.classList.add('active');
    }
    showingFirst = !showingFirst;

    // gold flash pulse
    frameWrap.classList.remove('pulse');
    void frameWrap.offsetWidth;
    frameWrap.classList.add('pulse');

    // advance quote
    quoteText.classList.add('fade');
    setTimeout(() => {
      quoteIdx = (quoteIdx + 1) % quotes.length;
      quoteText.textContent = quotes[quoteIdx];
      quoteIndex.textContent = toRoman(quoteIdx) + " / " + toRoman(quotes.length - 1);
      quoteText.classList.remove('fade');
    }, 220);
  }

  frameWrap.addEventListener('click', nextStep);
  frameWrap.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      nextStep();
    }
  });

  quoteIndex.textContent = toRoman(0) + " / " + toRoman(quotes.length - 1);

  setInterval(nextStep, 8000);
</script>

</body>
</html>
